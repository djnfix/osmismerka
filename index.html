<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slovní hledací hádanka</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" data-app>
      <section class="game-card" aria-labelledby="level-title">
        <aside class="word-panel">
          <div class="info-card">
            <div class="title-block">
              <div class="level-row">
                <label class="sr-only" for="difficulty-select">Obtížnost</label>
                <select class="difficulty-select" id="difficulty-select" data-difficulty-select aria-label="Obtížnost">
                  <option value="easy">Lehká</option>
                  <option value="medium">Střední</option>
                  <option value="hard">Těžká</option>
                </select>
                <button class="change-level-button" type="button" data-change-level title="Načíst novou osmisměrku">
                  <svg aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M16 3h5v5"/>
                    <path d="M4 20 21 3"/>
                    <path d="M21 16v5h-5"/>
                    <path d="M15 15l6 6"/>
                    <path d="M4 4l5 5"/>
                  </svg>
                  <span>Nová osmisměrka</span>
                </button>
              </div>
              <h1 class="sr-only" id="level-title" data-level-title>Slovní hledací hádanka</h1>
            </div>
          </div>

          <section class="word-list-card" aria-labelledby="word-list-title">
            <span class="word-list-heading" id="word-list-title">Hledaná slova</span>
            <ul class="word-list" data-word-list aria-label="Seznam slov"></ul>
          </section>

        </aside>

        <section class="board-section">
          <div class="board-wrap" data-board-wrap>
            <svg class="word-lines" data-word-lines aria-hidden="true"></svg>
            <div class="puzzle-grid" data-grid role="grid" aria-label="Mřížka písmen"></div>
          </div>
        </section>
      </section>

      <div class="result-dialog" data-result-dialog hidden role="dialog" aria-modal="true" aria-labelledby="result-title">
        <div class="result-panel">
          <button class="result-close" type="button" data-result-close aria-label="Zavřít výsledek">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M6 6l12 12"/>
              <path d="M18 6 6 18"/>
            </svg>
          </button>
          <span class="result-kicker">Tajenka</span>
          <h2 id="result-title" data-result-title>Vyřešeno</h2>
          <p data-result-secret></p>
          <button class="result-new-button" type="button" data-result-new>Nová osmisměrka</button>
        </div>
      </div>
    </main>

    <script src="levels.js"></script>
    <script src="app.js"></script>
  </body>
</html>
